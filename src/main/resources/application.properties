# Smart Campus Operations Hub

## Application Properties
spring.application.name=smart-campus-hub

## MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smart_campus_db}

## Server Configuration
server.port=${PORT:8080}

## File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB
file.upload-dir=./uploads

## JWT Configuration
app.jwt.secret=${JWT_SECRET:SmartCampusHub2026SecretKeyForJWTTokenGenerationThatIsLongEnoughForHS512Algorithm}
app.jwt.expiration-ms=86400000

## OAuth2 Configuration (Google) - Set via environment variables
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

## CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

## Logging
logging.level.com.smartcampus=INFO
logging.level.org.springframework.security=WARN
